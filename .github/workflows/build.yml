name: Build

on:

  schedule:
    - cron: '0 1 * * 1'

  push:

    branches:
      - master
      - dev
      - feature/*
      - dev/*
      - fix/*

  pull_request:

  workflow_dispatch:
    
jobs:

  Windows:
    
    runs-on: windows-2022

    strategy:
      matrix:
        python-version: [ 3.14 ]

    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Retrieve submodules
      run: git submodule update --init --recursive

    - name: Install Dependencies
      run: |
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.4.350.0/windows/vulkansdk-windows-X64-1.4.350.0.exe" -OutFile VulkanSDK.exe
        # ./VulkanSDK.exe --help
        ./VulkanSDK.exe --accept-licenses --default-answer --root D:/a/VulkanSDK --confirm-command install
        python3 -m pip install pl-build

    - name: Prep 1
      shell: cmd
      run: | 
        cd scripts
        python gen_build.py
        python gen_distribute.py

    - name: Build Pilot Light (DEBUG)
      shell: cmd
      run: |
        set VULKAN_SDK=D:/a/VulkanSDK
        cd src
        call build.bat -c debug
        if %ERRORLEVEL% NEQ 0 exit 1
        cd ../examples
        call build.bat -c debug
        if %ERRORLEVEL% NEQ 0 exit 1

    - name: Prep 2
      shell: cmd
      run: |
        rmdir /s /q out

    - name: Build Pilot Light (DEBUG EXPERIMENTAL)
      shell: cmd
      run: |
        set VULKAN_SDK=D:/a/VulkanSDK
        cd src
        call build.bat -c debug_experimental
        if %ERRORLEVEL% NEQ 0 exit 1

    - name: Prep 3
      shell: cmd
      run: |
        rmdir /s /q out

    - name: Build Pilot Light (RELEASE EXPERIMENTAL)
      shell: cmd
      run: |
        set VULKAN_SDK=D:/a/VulkanSDK
        cd src
        call build.bat -c release_experimental
        if %ERRORLEVEL% NEQ 0 exit 1

    - name: Prep 4
      shell: cmd
      run: |
        rmdir /s /q out

    - name: Build Pilot Light (RELEASE)
      shell: cmd
      run: |
        set VULKAN_SDK=D:/a/VulkanSDK
        cd src
        call build.bat -c release
        if %ERRORLEVEL% NEQ 0 exit 1
        cd ../examples
        call build.bat -c release
        if %ERRORLEVEL% NEQ 0 exit 1

    - name: Build Pilot Light Deployment (RELEASE)
      shell: cmd
      run: |
        set VULKAN_SDK=D:/a/VulkanSDK
        cd src
        call build_distribute.bat -c release
        if %ERRORLEVEL% NEQ 0 exit 1

    - name: Package Pilot Light
      shell: cmd
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python package.py

    - name: Upload Pilot Light
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: pilotlight_release_win32
        path: D:\a\pilotlight\pilotlight\out\pilotlight_win32.zip
        overwrite: true

    - name: Check New Project
      shell: cmd
      run: |
        set VULKAN_SDK=D:/a/VulkanSDK
        cd $GITHUB_WORKSPACE
        cd scripts
        python new_project.py ../../Test0 -c -hr
        python new_project.py ../../Test1 -c
        python new_project.py ../../Test2 -cpp -hr
        python new_project.py ../../Test3 -cpp
        cd ../../Test0/src
        call build_win32.bat
        if %ERRORLEVEL% NEQ 0 exit 1
        cd ../../Test1/src
        call build_win32.bat
        if %ERRORLEVEL% NEQ 0 exit 1
        cd ../../Test2/src
        call build_win32.bat
        if %ERRORLEVEL% NEQ 0 exit 1
        cd ../../Test3/src
        call build_win32.bat
        if %ERRORLEVEL% NEQ 0 exit 1


  MacOS:
    
    runs-on: macos-26
    env:
      CXX: g++-10

    strategy:
      matrix:
        python-version: [ 3.14 ]

    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Retrieve submodules
      run: git submodule update --init --recursive

    - name: Install Dependencies
      run: |
        curl https://sdk.lunarg.com/sdk/download/1.4.350.0/mac/vulkansdk-macos-1.4.350.0.zip -o vk.zip
        unzip vk.zip
        sudo ./vulkansdk-macOS-1.4.350.0.app/Contents/MacOS/vulkansdk-macOS-1.4.350.0 --root ~/VulkanSDK/1.4.350.0 --accept-licenses --default-answer --confirm-command install com.lunarg.vulkan.core com.lunarg.vulkan.usr com.lunarg.vulkan.sdl2 com.lunarg.vulkan.glm com.lunarg.vulkan.volk com.lunarg.vulkan.vma com.lunarg.vulkan.ios
        python3 -m pip install pl-build

    - name: Prep 1
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python3 gen_build.py
        python3 gen_distribute.py

    - name: Build Pilot Light (DEBUG)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c debug || exit 1
        cd ../examples
        chmod +x build.sh
        ./build.sh -c debug || exit 1

    - name: Prep 2
      run: |
        cd $GITHUB_WORKSPACE
        rm -r out

    - name: Build Pilot Light (DEBUG EXPERIMENTAL)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c debug_experimental || exit 1

    - name: Prep 3
      run: |
        cd $GITHUB_WORKSPACE
        rm -r out

    - name: Build Pilot Light (RELEASE EXPERIMENTAL)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c release_experimental || exit 1

    - name: Prep 4
      run: |
        cd $GITHUB_WORKSPACE
        rm -r out

    - name: Build Pilot Light (RELEASE)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c release || exit 1
        cd ../examples
        chmod +x build.sh
        ./build.sh -c release || exit 1

    - name: Build Pilot Light Deployment (RELEASE)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build_distribute.sh
        ./build_distribute.sh -c release || exit 1

    - name: Package Pilot Light
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python3 package.py

    - name: Upload Pilot Light
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: pilotlight_release_macos
        path: /Users/runner/work/pilotlight/pilotlight/out/pilotlight_macos.zip
        overwrite: true

    - name: Check New Project
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python new_project.py ../../Test0 -c -hr
        python new_project.py ../../Test1 -c
        python new_project.py ../../Test2 -cpp -hr
        python new_project.py ../../Test3 -cpp
        cd ../../Test0/src
        chmod +x build_macos.sh
        ./build_macos.sh || exit 1
        cd ../../Test1/src
        chmod +x build_macos.sh
        ./build_macos.sh || exit 1
        cd ../../Test2/src
        chmod +x build_macos.sh
        ./build_macos.sh || exit 1
        cd ../../Test3/src
        chmod +x build_macos.sh
        ./build_macos.sh || exit 1

  Ubuntu:
    
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        python-version: [ 3.14 ]

    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Retrieve submodules
      run: git submodule update --init --recursive

    - name: Install Dependencies
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.4.309-jammy.list https://packages.lunarg.com/vulkan/1.4.309/lunarg-vulkan-1.4.309-jammy.list
        sudo apt update
        sudo apt install vulkan-sdk
        sudo apt install libx11-dev
        sudo apt install libxkbcommon-x11-dev
        sudo apt install libx11-xcb-dev
        sudo apt install libxcb-xfixes0-dev
        sudo apt install libxcb-cursor-dev
        sudo apt install libxcb-cursor0
        sudo apt install libxcb-keysyms1-dev
        sudo apt install libxcursor-dev
        sudo apt install libxrandr-dev
        sudo apt install libxinerama-dev
        sudo apt install libgl-dev
        sudo apt install libxi-dev
        python3 -m pip install pl-build

    - name: Prep 1
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python3 gen_build.py
        python3 gen_distribute.py

    - name: Build Pilot Light (DEBUG)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c debug || exit 1
        cd ../examples
        chmod +x build.sh
        ./build.sh -c debug || exit 1

    - name: Prep 2
      run: |
        cd $GITHUB_WORKSPACE
        rm -r out

    - name: Build Pilot Light (DEBUG EXPERIMENTAL)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c debug_experimental || exit 1

    - name: Prep 3
      run: |
        cd $GITHUB_WORKSPACE
        rm -r out

    - name: Build Pilot Light (RELEASE EXPERIMENTAL)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c release_experimental || exit 1

    - name: Prep 4
      run: |
        cd $GITHUB_WORKSPACE
        rm -r out

    - name: Build Pilot Light (RELEASE)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build.sh
        ./build.sh -c release || exit 1
        cd ../examples
        chmod +x build.sh
        ./build.sh -c release || exit 1

    - name: Build Pilot Light Deployment (RELEASE)
      run: |
        cd $GITHUB_WORKSPACE
        cd src
        chmod +x build_distribute.sh
        ./build_distribute.sh -c release || exit 1

    - name: Package Pilot Light
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python3 package.py
        pwd

    - name: Upload Pilot Light
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: pilotlight_release_linux
        path: /home/runner/work/pilotlight/pilotlight/out/pilotlight_linux_amd64.zip
        overwrite: true

    - name: Check New Project
      run: |
        cd $GITHUB_WORKSPACE
        cd scripts
        python new_project.py ../../Test0 -c -hr
        python new_project.py ../../Test1 -c
        python new_project.py ../../Test2 -cpp -hr
        python new_project.py ../../Test3 -cpp
        cd ../../Test0/src
        chmod +x build_linux.sh
        ./build_linux.sh || exit 1
        cd ../../Test1/src
        chmod +x build_linux.sh
        ./build_linux.sh || exit 1
        cd ../../Test2/src
        chmod +x build_linux.sh
        ./build_linux.sh || exit 1
        cd ../../Test3/src
        chmod +x build_linux.sh
        ./build_linux.sh || exit 1
